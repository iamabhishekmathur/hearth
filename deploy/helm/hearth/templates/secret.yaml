apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hearth.fullname" . }}-secret
  labels:
    {{- include "hearth.labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  {{- include "hearth.requireSecret" (dict "name" "encryptionKey" "value" .Values.secrets.encryptionKey) }}
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | b64enc | quote }}
  {{- include "hearth.requireSecret" (dict "name" "sessionSecret" "value" .Values.secrets.sessionSecret) }}
  SESSION_SECRET: {{ .Values.secrets.sessionSecret | b64enc | quote }}
  REDIS_URL: {{ .Values.env.redisUrl | b64enc | quote }}
  {{- if .Values.postgres.password }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | b64enc | quote }}
  {{- end }}
