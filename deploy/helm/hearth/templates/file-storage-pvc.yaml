{{- if .Values.fileStorage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hearth.fullname" . }}-file-storage
  labels:
    {{- include "hearth.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteMany
  {{- if .Values.fileStorage.storageClass }}
  storageClassName: {{ .Values.fileStorage.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.fileStorage.size }}
{{- end }}
